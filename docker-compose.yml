services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-rag-postgres
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ragdb
    ports: ["127.0.0.1:${POSTGRES_PORT:-5432}:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  adminer:
    image: adminer
    ports: ["127.0.0.1:${ADMINER_PORT:-8081}:8080"]
    restart: unless-stopped

  ollama:
    profiles: ["containerized-ollama"]
    image: ollama/ollama:0.31.1
    container_name: ai-rag-ollama
    ports: ["127.0.0.1:${OLLAMA_PORT:-11434}:11434"]
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama-init:
    profiles: ["containerized-ollama"]
    image: ollama/ollama:0.31.1
    depends_on:
      - ollama
    restart: "no"
    entrypoint: >
      sh -c "until OLLAMA_HOST=http://ollama:11434 ollama list >/dev/null 2>&1;
      do sleep 2; done;
      OLLAMA_HOST=http://ollama:11434 ollama pull llama3.2"

  app:
    build: .
    container_name: ai-rag-app
    ports: ["127.0.0.1:${APP_PORT:-8000}:8000"]
    environment:
      DATABASE_URL: postgresql://raguser:${POSTGRES_PASSWORD}@postgres:5432/ragdb
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      OLLAMA_MODEL: llama3.2
    depends_on:
      postgres:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
        required: false

volumes:
  postgres_data:
  ollama_data: